services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app_home:/home/node
      - ~/:/home/node/host
      - ~/.ssh:/home/node/.ssh:ro
    user: node
    # Enable init process to reap zombie processes
    init: true

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH

    # Port mappings for host access (backend only - frontend uses Vite with dynamic HMR ports via VS Code forwarding)
    ports:
      - '3001:3001'
      - '3003:3003'
      - '2222:22' # SSH access to container for development
      - '4242:4242'

  gai-nats:
    build:
      context: ../services/nats-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4222:4222' # Client connections
      - '8222:8222' # HTTP monitoring
      - '6222:6222' # Cluster routing (for future clustering)
    volumes:
      - nats_data:/data

  gai-qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    environment:
      # Qdrant configuration
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      # Enable API key authentication (optional - uncomment for production)
      # - QDRANT__SERVICE__API_KEY=your-secret-api-key-here
      # Performance settings
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=2
      # Collection defaults
      - QDRANT__COLLECTION__DEFAULT_REPLICATION_FACTOR=1
      - QDRANT__COLLECTION__DEFAULT_WRITE_CONSISTENCY_FACTOR=1
      # API Key
      - QDRANT__SERVICE__API_KEY=Test123
    ports:
      - '6333:6333' # HTTP API
      - '6334:6334' # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

  gai-chatweb-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatweb
      POSTGRES_USER: chatweb
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - chatweb_db_data:/var/lib/postgresql/data

  gai-test-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - '5434:5432'
    volumes:
      - test_db_data:/var/lib/postgresql/data

  gai-keycloak-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - '5433:5432'
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  gai-keycloak:
    image: quay.io/keycloak/keycloak:26.4
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://gai-keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password

      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: false

      KC_HTTP_ENABLED: true
      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      - gai-keycloak-db
    ports:
      - 8180:8080

  pgadmin:
    image: 'docker.io/dpage/pgadmin4:latest'
    environment:
      PGADMIN_DEFAULT_EMAIL: 'dev@progwise.net'
      PGADMIN_DEFAULT_PASSWORD: 'admin'
    ports:
      - 15080:80
    volumes:
      - pgadmin_data:/var/lib/pgadmin/

  gai-smb-test:
    build:
      context: ..
      dockerfile: apps/smb-test-server/Dockerfile
    hostname: gai-smb-test
    ports:
      - '10445:445' # SMB over TCP
      - '10139:139' # NetBIOS session service
      - '10137:137/udp' # NetBIOS name service
      - '10138:138/udp' # NetBIOS datagram service
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    environment:
      # Required for local testing of webhooks
      - WEBHOOK_TUNNEL_URL=http://localhost:5678/
      # Set timezone
      - GENERIC_TIMEZONE=utc
      - TZ=utc
      # First-time setup - create owner account at http://localhost:5678
      # Recommended: dev@george-ai.net / yourStrongPassword
    volumes:
      - n8n_data:/home/node/.n8n

  gai-crawl4ai:
    build:
      context: ..
      dockerfile: ./services/webcrawler-service/Dockerfile
    restart: unless-stopped
    ports:
      - '11245:11245'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11245/healthcheck/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_home:
  n8n_data:
  pgadmin_data:
  chatweb_db_data:
  qdrant_data:
  typesense_data:
  keycloak_db_data:
  test_db_data:
  pnpm_store:
  nats_data:
